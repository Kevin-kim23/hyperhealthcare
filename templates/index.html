<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Health Log AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <span class="text-xl font-bold text-emerald-600 flex items-center gap-2">
                🏥 My Health Log <span class="text-xs bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded-full font-normal">v3.5 SQL</span>
            </span>
            <div class="text-sm text-slate-500 font-medium">환영합니다, 동환님</div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <div id="warning-banner" class="hidden mb-6 p-4 bg-rose-50 border border-rose-200 text-rose-800 rounded-xl flex items-center gap-3 shadow-sm">
            <span class="text-xl">⚠️</span>
            <div class="font-medium" id="warning-text"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-fit">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-900">📝 오늘 기록하기</h2>
                <form id="health-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">측정 날짜</label>
                        <input type="date" id="date" required class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-emerald-500 text-sm font-medium">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">키 (cm)</label>
                            <input type="number" id="height" step="0.1" value="175" required class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-emerald-500 text-sm font-medium">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">몸무게 (kg)</label>
                            <input type="number" id="weight" step="0.1" value="70" required class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-emerald-500 text-sm font-medium">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">최고 혈압(수축)</label>
                            <input type="number" id="systolic" value="115" required class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-emerald-500 text-sm font-medium">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">최저 혈압(이완)</label>
                            <input type="number" id="diastolic" value="75" required class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-emerald-500 text-sm font-medium">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">공복 혈당 (mg/dL)</label>
                        <input type="number" id="blood_sugar" value="95" required class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-emerald-500 text-sm font-medium">
                    </div>
                    <button type="submit" class="w-full py-3 bg-emerald-600 text-white rounded-lg font-bold text-sm shadow-md hover:bg-emerald-700 transition duration-150">
                        🚀 AI 건강 진단 및 SQL 저장
                    </button>
                </form>
            </div>

            <div class="lg:grid-cols-1 lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold text-slate-900">🗄️ 과거 히스토리 (SQLite 로깅)</h2>
                        <button onclick="fetchHistory()" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold rounded-lg transition duration-150">🔄 새로고침</button>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-slate-100 text-xs font-semibold text-slate-400 uppercase tracking-wider">
                                    <th class="py-3 px-2">ID</th>
                                    <th class="py-3 px-2">날짜</th>
                                    <th class="py-3 px-2">BMI 지수</th>
                                    <th class="py-3 px-2">혈압 판정</th>
                                    <th class="py-3 px-2">혈당 판정</th>
                                    <th class="py-3 px-2 text-center">동작</th>
                                </tr>
                            </thead>
                            <tbody id="history-tbody" class="text-sm font-medium text-slate-600 divide-y divide-slate-50">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 오늘 날짜 기본 세팅
        document.getElementById('date').value = new Date().toISOString().substring(0, 10);

        // API 연동: 건강 일지 제출 처리
        document.getElementById('health-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                date: document.getElementById('date').value,
                weight: floatValue('weight'),
                height: floatValue('height'),
                systolic: intValue('systolic'),
                diastolic: intValue('diastolic'),
                blood_sugar: intValue('blood_sugar')
            };

            const response = await fetch('/records', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                json: true,
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const data = await response.json();
                handleWarningBanner(data);
                fetchHistory();
            }
        });

        function floatValue(id) { return parseFloat(document.getElementById(id).value); }
        function intValue(id) { return parseInt(document.getElementById(id).value); }

        function handleWarningBanner(data) {
            const banner = document.getElementById('warning-banner');
            const text = document.getElementById('warning-text');
            if (data.warning) {
                banner.classList.remove('hidden');
                text.innerText = data.warning_message;
            } else {
                banner.classList.add('hidden');
            }
        }

        // API 연동: 전체 리스트 가져와서 표에 박아넣기
        async function fetchHistory() {
            const response = await fetch('/records');
            if (response.ok) {
                const json = await response.json();
                const tbody = document.getElementById('history-tbody');
                tbody.innerHTML = '';
                
                json.data.forEach(r => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-slate-50/80 transition duration-100";
                    tr.innerHTML = `
                        <td class="py-3 px-2 font-bold text-slate-400">${r.id}</td>
                        <td class="py-3 px-2 font-semibold text-slate-900">${r.date}</td>
                        <td class="py-3 px-2"><span class="px-2 py-1 bg-slate-100 rounded-md text-xs">${r.bmi} (${r.bmi_status})</span></td>
                        <td class="py-3 px-2">${getBadge(r.blood_pressure_status)}</td>
                        <td class="py-3 px-2">${getBadge(r.blood_sugar_status)}</td>
                        <td class="py-3 px-2 text-center">
                            <button onclick="deleteRecord(${r.id})" class="text-rose-500 hover:text-rose-700 text-xs font-bold px-2 py-1 rounded border border-rose-100 hover:bg-rose-50">삭제</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function getBadge(status) {
            if (status === '정상') return `<span class="px-2 py-0.5 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-full text-xs">${status}</span>`;
            if (status.includes('주의') || status.includes('전단계') || status.includes('전고혈압')) return `<span class="px-2 py-0.5 bg-amber-50 text-amber-700 border border-amber-200 rounded-full text-xs">${status}</span>`;
            return `<span class="px-2 py-0.5 bg-rose-50 text-rose-700 border border-rose-200 rounded-full text-xs font-semibold">${status}</span>`;
        }

        async function deleteRecord(id) {
            if(confirm("정말 이 일지를 삭제할까요?")) {
                await fetch(`/records/${id}`, { method: 'DELETE' });
                fetchHistory();
            }
        }

        // 초기 구동 로드
        fetchHistory();
    </script>
</body>
</html>
